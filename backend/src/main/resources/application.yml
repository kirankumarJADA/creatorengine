# ────────────────────────────────────────────────
# CreatorEngine — base configuration
# ────────────────────────────────────────────────
spring:
  application:
    name: creatorengine-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 8000
          timeout: 8000
          writetimeout: 8000

server:
  port: ${PORT:${SERVER_PORT:8080}}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

app:
  name: ${APP_NAME:CreatorEngine}
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

  security:
    jwt:
      secret: ${JWT_SECRET:CHANGE_ME_GENERATE_A_LONG_RANDOM_BASE64_SECRET}
      issuer: ${JWT_ISSUER:creatorengine}
      access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
      refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

  firebase:
    project-id: ${FIREBASE_PROJECT_ID:}
    web-api-key: ${FIREBASE_WEB_API_KEY:}
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
    credentials-json: ${FIREBASE_CREDENTIALS_JSON:}
    password-reset-redirect-url: ${FIREBASE_PASSWORD_RESET_REDIRECT_URL:http://localhost:5173/login}

  meta:
    app-id:        ${META_APP_ID:}
    app-secret:    ${META_APP_SECRET:}
    verify-token:  ${META_VERIFY_TOKEN:change-me-meta-verify-token}
    redirect-uri:  ${META_REDIRECT_URI:http://localhost:8080/api/instagram/callback}
    success-redirect-uri: ${META_SUCCESS_REDIRECT_URI:http://localhost:5173/instagram/callback}
    graph-api-version: ${META_GRAPH_API_VERSION:v19.0}
    scopes: ${META_SCOPES:instagram_business_basic,instagram_business_manage_messages,instagram_business_manage_comments}

  ai:
    openai:
      api-key:    ${OPENAI_API_KEY:}
      model:      ${OPENAI_MODEL:gpt-4o-mini}
      base-url:   ${OPENAI_BASE_URL:https://api.openai.com/v1}
      timeout-ms: ${OPENAI_TIMEOUT_MS:20000}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.creatorengine: DEBUG
    org.springframework.security: INFO