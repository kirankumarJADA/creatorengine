# Render Blueprint — provisions the CreatorEngine backend.
#
# Usage:
#   1. Push this file to your repo's default branch.
#   2. In Render: New → Blueprint → connect this repo.
#   3. Render reads this file, creates the service, and prompts you
#      to fill in the env vars marked `sync: false` below.
#
# After first deploy, set the env vars in the Render dashboard:
#   • JWT_SECRET                  — `openssl rand -base64 64`
#   • FIREBASE_PROJECT_ID         — from Firebase console
#   • FIREBASE_WEB_API_KEY        — from Firebase console → Project settings
#   • FIREBASE_CREDENTIALS_JSON   — paste the service-account JSON inline
#   • META_APP_ID, META_APP_SECRET — from developers.facebook.com
#   • META_VERIFY_TOKEN           — high-entropy string you also paste into Meta
#   • META_REDIRECT_URI           — https://<your-render-url>/api/instagram/callback
#   • META_SUCCESS_REDIRECT_URI   — https://<your-vercel-url>/instagram/callback
#   • CORS_ALLOWED_ORIGINS        — https://<your-vercel-url>
#   • FRONTEND_BASE_URL           — https://<your-vercel-url>
#   • FIREBASE_PASSWORD_RESET_REDIRECT_URL — https://<your-vercel-url>/login
#
# The backend's EnvironmentValidator will fail-fast at startup if any
# of these are missing or still hold placeholder defaults.

services:
  - type: web
    name: creatorengine-backend
    runtime: docker
    plan: starter
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_ISSUER
        value: creatorengine
      - key: JWT_ACCESS_EXPIRATION_MS
        value: "900000"        # 15 minutes
      - key: JWT_REFRESH_EXPIRATION_MS
        value: "604800000"     # 7 days
      - key: META_GRAPH_API_VERSION
        value: v19.0

      # Secrets — set in dashboard, never committed
      - key: JWT_SECRET
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_WEB_API_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: FIREBASE_PASSWORD_RESET_REDIRECT_URL
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: META_REDIRECT_URI
        sync: false
      - key: META_SUCCESS_REDIRECT_URI
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
